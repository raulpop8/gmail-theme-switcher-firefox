<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="theme-options">
      <button class="theme-btn" id="auto-btn" data-mode="auto" title="Follow system preferences">
        <span class="icon">🔄</span>
        <span class="label">Auto</span>
      </button>

      <button class="theme-btn" id="light-btn" data-mode="light" title="Always use light theme">
        <span class="icon">☀️</span>
        <span class="label">Light</span>
      </button>

      <button class="theme-btn" id="dark-btn" data-mode="dark" title="Always use dark theme">
        <span class="icon">🌙</span>
        <span class="label">Dark</span>
      </button>
    </div>

    <div class="footer">
      <a href="https://ko-fi.com/raulpop" target="_blank" class="kofi-btn" title="Support this extension">
        ☕ Support on Ko-fi
      </a>
      
      <div class="feedback-buttons">
        <a href="https://addons.mozilla.org/en-US/firefox/addon/gmail-dark-mode-switcher/reviews/" target="_blank" class="feedback-btn review-btn" title="Leave a review">
          ⭐ Review
        </a>
        <a href="mailto:raul.pop8@gmail.com?subject=Gmail%20Theme%20Syncer%20-%20Issue%20Report&body=Please%20describe%20your%20issue%3A%0A%0A(Please%20include%20a%20screenshot%20if%20possible)%0A%0A" class="feedback-btn issue-btn" title="Report an issue">
          🐛 Report Issue
        </a>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
